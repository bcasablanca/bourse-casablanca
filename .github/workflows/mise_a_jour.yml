name: Mise a jour dashboard bourse

on:
  schedule:
    - cron: "0 7 * * 2-6"  # 8h00 Maroc (UTC+1) mardi-samedi
  workflow_dispatch:         # Bouton pour lancer manuellement

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install casased pandas requests beautifulsoup4 lxml

      - name: Script 4 - Fondamentaux
        run: python 4_recuperer_fondamentaux.py
        continue-on-error: true

      - name: Script 2 - Mise a jour CSV
        run: python 2_mise_a_jour_quotidienne.py
        continue-on-error: true

      - name: Script 3 - Generation HTML
        run: python 3_generer_html.py

      - name: Commit et push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Mise a jour $(date +%Y-%m-%d)"
          git push
